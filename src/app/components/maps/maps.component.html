<section class="w-full min-h-screen overflow-hidden">
  <div class="mt-[112px] mb-16 ml-8 md:ml-[230px] w-full md:w-[calc(100%-230px)] flex flex-col gap-6">

    <h1 class="text-2xl font-display font-black uppercase tracking-tighter text-cream animate-slide-down px-4">
      Mapas
    </h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 px-4">
      <div
        *ngFor="let map of mapas; let i = index"
        appScrollReveal
        [revealDelay]="i * 60"
        class="group relative w-full h-[300px] rounded-xl overflow-hidden cursor-default
               shadow-[0_4px_24px_-6px_rgba(0,0,0,0.6)]
               transition-all duration-500 hover:-translate-y-1 hover:shadow-[0_16px_48px_-10px_rgba(199,0,57,0.45)]"
      >
        <!-- Map image -->
        <img
          [src]="map.splash"
          [alt]="map.displayName"
          class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105"
          loading="lazy"
        />

        <!-- Always-on gradient: darkens bottom for readability -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-transparent"></div>

        <!-- Coordinates badge — top right -->
        <span
          *ngIf="map.coordinates"
          class="absolute top-3 right-3 text-[10px] font-display font-bold uppercase tracking-widest
                 text-cream/60 bg-black/40 backdrop-blur-sm border border-white/10 px-2 py-1 rounded"
        >
          {{ map.coordinates }}
        </span>

        <!-- Bottom info block -->
        <div class="absolute bottom-0 left-0 right-0 p-5 flex flex-col gap-2 z-10">
          <h3 class="text-2xl font-display font-black text-cream uppercase tracking-tighter leading-none
                     transition-transform duration-300 group-hover:-translate-y-1">
            {{ map.displayName }}
          </h3>

          <!-- Description: hidden by default, slides up on hover -->
          <p class="text-xs font-body text-cream/75 leading-relaxed max-h-0 overflow-hidden
                    transition-all duration-500 ease-out
                    group-hover:max-h-[80px] group-hover:opacity-100 opacity-0">
            {{ map.narrativeDescription }}
          </p>
        </div>
      </div>
    </div>

  </div>
</section>
