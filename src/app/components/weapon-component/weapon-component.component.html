<section class="w-full min-h-screen overflow-hidden">
  <div class="mt-[112px] mb-16 ml-8 md:ml-[230px] w-full md:w-[calc(100%-230px)] flex flex-col gap-6">

    <h1 class="text-2xl font-display font-black uppercase tracking-tighter text-cream animate-slide-down px-4">
      Armas
    </h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 px-4">
      <div
        *ngFor="let arma of armas; let i = index"
        appScrollReveal
        [revealDelay]="i * 40"
        class="group bg-crimson/60 border border-crimson-dark/30 rounded-xl overflow-hidden flex flex-col
               transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_12px_40px_-10px_rgba(199,0,57,0.55)] hover:border-crimson/60"
      >
        <!-- Image area -->
        <div class="relative flex items-center justify-center px-6 pt-6 pb-4 bg-black/10 min-h-[110px]">
          <img
            [src]="arma.displayIcon"
            [alt]="arma.displayName"
            class="w-full max-h-[80px] object-contain drop-shadow-[0_4px_12px_rgba(0,0,0,0.5)]
                   transition-transform duration-500 group-hover:scale-110"
            loading="lazy"
          />
        </div>

        <!-- Info area -->
        <div class="flex flex-col gap-3 p-4 flex-1">
          <!-- Name + category -->
          <div class="flex flex-col gap-1">
            <h3 class="text-base font-display font-black text-cream tracking-tight leading-tight">
              {{ arma.displayName }}
            </h3>
            <span class="text-[10px] font-display font-bold uppercase tracking-[0.15em] text-cream/50">
              {{ arma.shopData.category }}
            </span>
          </div>

          <!-- Price -->
          <div class="flex items-center gap-1.5 mt-auto">
            <svg class="w-3 h-3 text-cream/50" viewBox="0 0 12 12" fill="currentColor">
              <path d="M6 0L7.5 4.5H12L8.25 7.5L9.75 12L6 9L2.25 12L3.75 7.5L0 4.5H4.5Z"/>
            </svg>
            <span class="text-sm font-mono font-bold text-cream">
              {{ arma.shopData.cost }}
            </span>
            <span class="text-xs text-cream/40 font-body">VP</span>
          </div>
        </div>

        <!-- Button -->
        <div class="px-4 pb-4">
          <button
            type="button"
            (click)="showDiv(arma.uuid)"
            class="w-full bg-cream text-off-black font-display font-bold text-xs uppercase tracking-widest py-2.5 rounded-lg
                   transition-all duration-200 hover:bg-cream/90 active:scale-[0.98]"
          >
            Ver Skins
          </button>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- Skins Modal -->
<ng-container *ngFor="let arma of armas">
  <div
    *ngIf="divAtiva === arma.uuid"
    class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4"
    (click)="showDiv(arma.uuid)"
  >
    <div
      [@modalAnimation]
      (click)="$event.stopPropagation()"
      class="relative w-full max-w-4xl max-h-[85vh] rounded-2xl overflow-hidden flex flex-col
             shadow-[0_24px_80px_-10px_rgba(0,0,0,0.9)]"
      style="background: linear-gradient(135deg, #a8002f 0%, #7a001f 100%);"
    >
      <!-- Modal header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-white/10 flex-shrink-0">
        <div class="flex items-center gap-3">
          <img
            [src]="arma.displayIcon"
            [alt]="arma.displayName"
            class="h-7 object-contain opacity-80"
          />
          <div class="flex flex-col">
            <span class="text-[10px] font-display font-bold uppercase tracking-[0.2em] text-cream/40">Skins disponíveis</span>
            <h2 class="text-lg font-display font-black text-cream uppercase tracking-tight leading-tight">
              {{ arma.displayName }}
            </h2>
          </div>
        </div>
        <button
          (click)="showDiv(arma.uuid)"
          class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20
                 text-cream text-xl leading-none transition-all duration-150 active:scale-95 focus:outline-none"
          aria-label="Fechar"
        >
          ×
        </button>
      </div>

      <!-- Skins grid -->
      <div class="overflow-y-auto p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          <div
            *ngFor="let skin of arma.skins"
            class="group bg-black/20 border border-white/8 rounded-xl p-4 flex flex-col gap-3
                   transition-all duration-300 hover:bg-black/30 hover:border-white/15"
          >
            <div class="flex items-center justify-center h-[80px]">
              <img
                *ngIf="skin.displayIcon"
                [src]="skin.displayIcon"
                [alt]="skin.displayName"
                class="max-h-full w-full object-contain transition-transform duration-300 group-hover:scale-105"
                loading="lazy"
              />
              <div *ngIf="!skin.displayIcon" class="text-cream/20 text-xs font-body italic text-center">
                Sem imagem
              </div>
            </div>
            <span class="text-xs font-display font-semibold text-cream/85 tracking-tight leading-tight text-center">
              {{ skin.displayName }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>
