<section class="w-full min-h-screen overflow-hidden" style="background: #2e000d;">
  <div class="mt-[112px] mb-16 box-border w-full min-w-0 max-w-full pl-4 pr-4 sm:pl-6 sm:pr-6 md:pl-[calc(230px+2rem)] md:pr-10">
    <div class="mx-auto flex w-full min-w-0 max-w-[1400px] flex-col gap-6">

    <h1 class="text-2xl font-display font-black uppercase tracking-tighter text-cream animate-slide-down">
      Maps
    </h1>

    <div class="grid grid-cols-1 gap-5 lg:grid-cols-2">
      <div
        *ngFor="let map of mapas; let i = index"
        appScrollReveal
        [revealDelay]="i * 60"
        class="group relative w-full h-[300px] rounded-xl overflow-hidden cursor-default border border-crimson-dark/40
               shadow-[0_4px_24px_-6px_rgba(0,0,0,0.6)]
               transition-all duration-400 hover:-translate-y-1 hover:shadow-[0_20px_50px_-10px_rgba(199,0,57,0.65)] hover:border-crimson/50"
      >
        <!-- Map image -->
        <img
          [src]="map.splash"
          [alt]="map.displayName"
          class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105"
          loading="lazy"
        />

        <div class="absolute top-0 left-0 right-0 h-20 bg-gradient-to-b from-black/40 to-transparent pointer-events-none z-[1]"></div>

        <!-- Always-on gradient: darkens bottom for readability -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-transparent z-[1]"></div>

        <!-- Coordinates badge — top right -->
        <span
          *ngIf="map.coordinates"
          class="absolute top-3 right-3 z-[2] text-[10px] font-display font-bold uppercase tracking-widest
                 text-cream/60 bg-black/40 backdrop-blur-sm border border-white/10 px-2 py-1 rounded"
        >
          {{ map.coordinates }}
        </span>

        <!-- Bottom info block -->
        <div class="absolute bottom-0 left-0 right-0 p-5 flex flex-col gap-2 z-[2]">
          <h3 class="text-2xl font-display font-black text-cream uppercase tracking-tighter leading-none
                     transition-transform duration-300 group-hover:-translate-y-1">
            {{ map.displayName }}
          </h3>

          <!-- Description: hidden by default, slides up on hover -->
          <p class="text-xs font-body text-cream/75 leading-relaxed max-h-0 overflow-hidden
                    transition-all duration-500 ease-out
                    group-hover:max-h-[80px] group-hover:opacity-100 opacity-0">
            {{ map.narrativeDescription }}
          </p>
        </div>
      </div>
    </div>

    </div>
  </div>
</section>
