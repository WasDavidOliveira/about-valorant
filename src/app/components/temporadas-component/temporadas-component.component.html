<section class="w-full min-h-screen overflow-hidden" style="background: #2e000d;">
  <div class="mt-[112px] mb-16 ml-8 md:ml-[230px] w-full md:w-[calc(100%-230px)] flex flex-col gap-8">

    <header class="px-4">
      <h1 class="text-2xl font-display font-black uppercase tracking-tighter text-cream animate-slide-down m-0">
        Temporadas
      </h1>
    </header>

    <div *ngIf="loading" class="flex flex-col gap-6 px-4">
      <div class="h-5 w-48 rounded-md bg-cream/10 animate-pulse"></div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div
          *ngFor="let _ of skeletonSlots"
          class="min-h-[160px] rounded-xl border border-crimson-dark/25 bg-crimson/15 animate-pulse"
        ></div>
      </div>
    </div>

    <div *ngIf="!loading && loadFailed" class="px-4">
      <p class="text-sm font-body text-cream/55 m-0 border border-white/10 rounded-xl px-4 py-6 bg-black/20">
        Não foi possível carregar as temporadas. Tente atualizar a página.
      </p>
    </div>

    <div *ngIf="!loading && !loadFailed && sections.length === 0" class="px-4">
      <p class="text-sm font-body text-cream/55 m-0">Nenhuma temporada disponível.</p>
    </div>

    <div *ngIf="!loading && !loadFailed && sections.length > 0" class="flex flex-col gap-14">
      <section
        *ngFor="let sec of sections; let si = index"
        class="flex flex-col gap-5"
        [attr.aria-labelledby]="'temp-sec-' + sec.sectionId"
      >
        <div class="flex items-stretch gap-3 px-4">
          <span class="w-1 shrink-0 rounded-full bg-crimson" aria-hidden="true"></span>
          <h2
            [id]="'temp-sec-' + sec.sectionId"
            class="text-lg md:text-xl font-display font-black uppercase tracking-tight text-cream m-0 leading-none min-w-0"
          >
            {{ sec.heading }}
          </h2>
        </div>

        <div
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 px-4"
        >
          <article
            *ngFor="let card of sec.cards; let ci = index"
            appScrollReveal
            [revealDelay]="revealDelay(si, ci)"
            class="group relative rounded-xl overflow-hidden flex flex-col gap-4 p-5 min-h-[150px] border border-crimson-dark/40
                   transition-all duration-400
                   hover:-translate-y-1 hover:shadow-[0_20px_50px_-10px_rgba(199,0,57,0.65)] hover:border-crimson/50"
            style="background: linear-gradient(160deg, #92002b 0%, #60001c 100%);"
          >
            <div class="absolute top-0 left-0 right-0 h-14 bg-gradient-to-b from-black/40 to-transparent z-[1] pointer-events-none"></div>
            <h3 class="relative z-[2] text-base font-display font-bold text-cream tracking-tight leading-tight m-0">
              {{ card.title }}
            </h3>
            <div class="relative z-[2] flex flex-col gap-2.5 text-sm font-body text-cream/75 mt-auto">
              <span class="flex items-center gap-2">
                <i class="fa-solid fa-calendar-day text-cream/45 w-4 shrink-0 text-center" aria-hidden="true"></i>
                <span>Início <strong class="text-cream font-mono font-semibold">{{ card.startTime | date: 'dd/MM/yyyy' }}</strong></span>
              </span>
              <span class="flex items-center gap-2">
                <i class="fa-solid fa-calendar-check text-cream/45 w-4 shrink-0 text-center" aria-hidden="true"></i>
                <span>Fim <strong class="text-cream font-mono font-semibold">{{ card.endTime | date: 'dd/MM/yyyy' }}</strong></span>
              </span>
            </div>
          </article>
        </div>
      </section>
    </div>

  </div>
</section>
