<section
  class="w-full min-h-screen overflow-hidden"
  style="background: #2e000d;"
  *ngIf="agente && agente.displayName"
>
  <div class="box-border w-full min-w-0 max-w-full pl-4 pr-4 sm:pl-6 sm:pr-6 md:pl-[calc(230px+2rem)] md:pr-10">
    <div class="mx-auto flex w-full min-w-0 max-w-[1400px] flex-col">

    <div class="relative h-[min(72vh,520px)] min-h-[380px] overflow-hidden border-b border-crimson-dark/25">
      <img
        *ngIf="agente.background"
        [src]="agente.background"
        alt=""
        class="pointer-events-none absolute inset-0 h-full w-full scale-105 object-cover opacity-25 blur-md select-none"
        aria-hidden="true"
      />

      <div class="absolute inset-0 bg-gradient-to-r from-[#2e000d] via-[#2e000d]/95 to-[#2e000d]/20"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-[#2e000d] via-transparent to-black/20"></div>

      <img
        [src]="agente.fullPortrait"
        [alt]="agente.displayName"
        class="pointer-events-none absolute bottom-0 right-0 h-[min(88%,480px)] max-h-[500px] select-none object-contain object-bottom drop-shadow-[0_12px_48px_rgba(0,0,0,0.75)] md:h-[min(90%,490px)]"
      />

      <div class="absolute bottom-0 left-0 z-10 flex max-w-[min(100%,36rem)] flex-col gap-3 p-6 pb-8 md:max-w-[55%] md:p-8 md:pb-10">
        <div *ngIf="agente.role" class="flex w-fit items-center gap-2">
          <img
            [src]="agente.role.displayIcon"
            [alt]="agente.role.displayName"
            class="h-4 w-4 object-contain opacity-85"
          />
          <span class="font-display text-xs font-bold uppercase tracking-[0.2em] text-cream/50">
            {{ agente.role.displayName }}
          </span>
        </div>

        <h1 class="animate-slide-down font-display text-4xl font-black uppercase leading-[0.95] tracking-tighter text-cream sm:text-5xl md:text-6xl">
          {{ agente.displayName }}
        </h1>

        <p class="line-clamp-3 max-w-[55ch] font-body text-sm leading-relaxed text-cream/70 md:line-clamp-2">
          {{ agente.description }}
        </p>
      </div>
    </div>

    <div class="mb-16 flex flex-col gap-10 px-4 py-10 sm:px-6 md:px-8">

      <div
        class="grid grid-cols-1 gap-8 lg:grid-cols-2 lg:gap-10"
        appScrollReveal
        [revealDelay]="0"
      >
        <div class="flex flex-col gap-3">
          <h2 class="font-display text-xs font-bold uppercase tracking-[0.2em] text-cream/40">
            About
          </h2>
          <p class="font-body text-base leading-relaxed text-cream/85">
            {{ agente.description }}
          </p>
        </div>

        <div *ngIf="agente.role" class="flex flex-col gap-3">
          <h2 class="font-display text-xs font-bold uppercase tracking-[0.2em] text-cream/40">
            Role
          </h2>
          <div
            class="group relative flex flex-col gap-3 overflow-hidden rounded-xl border border-crimson-dark/40 p-5
                   transition-all duration-400 hover:-translate-y-0.5 hover:border-crimson/50 hover:shadow-[0_20px_50px_-12px_rgba(199,0,57,0.45)]"
            style="background: linear-gradient(160deg, #92002b 0%, #60001c 100%);"
          >
            <div class="pointer-events-none absolute top-0 left-0 right-0 h-14 bg-gradient-to-b from-black/35 to-transparent"></div>
            <div class="relative z-[1] flex items-center gap-3">
              <img
                [src]="agente.role.displayIcon"
                [alt]="agente.role.displayName"
                class="h-8 w-8 object-contain"
              />
              <span class="font-display text-base font-black uppercase tracking-wide text-cream">
                {{ agente.role.displayName }}
              </span>
            </div>
            <p class="relative z-[1] font-body text-sm leading-relaxed text-cream/80">
              {{ agente.role.description }}
            </p>
          </div>
        </div>
      </div>

      <div class="h-px bg-white/8"></div>

      <div class="flex flex-col gap-5" appScrollReveal [revealDelay]="80">
        <h2 class="font-display text-xs font-bold uppercase tracking-[0.2em] text-cream/40">
          Abilities
        </h2>
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div
            *ngFor="let ability of agente.abilities; let i = index"
            appScrollReveal
            [revealDelay]="80 + i * 70"
            class="group relative flex cursor-default flex-col gap-3 overflow-hidden rounded-xl border border-crimson-dark/40 p-5
                   transition-all duration-400
                   hover:-translate-y-1 hover:border-crimson/50 hover:shadow-[0_20px_50px_-12px_rgba(199,0,57,0.5)]"
            style="background: linear-gradient(160deg, #92002b 0%, #60001c 100%);"
          >
            <div class="pointer-events-none absolute top-0 left-0 right-0 h-12 bg-gradient-to-b from-black/40 to-transparent"></div>
            <div class="relative z-[1] flex items-center justify-between gap-2">
              <img
                *ngIf="ability.displayIcon"
                [src]="ability.displayIcon"
                [alt]="ability.displayName"
                class="h-10 w-10 object-contain transition-transform duration-300 group-hover:scale-110"
              />
              <span
                class="rounded border border-white/15 bg-black/25 px-2 py-1 font-display text-[10px] font-bold uppercase tracking-widest text-cream/75"
              >
                {{ ability.slot }}
              </span>
            </div>
            <h3 class="relative z-[1] font-display text-sm font-bold uppercase tracking-wide text-cream">
              {{ ability.displayName }}
            </h3>
            <p class="relative z-[1] font-body text-xs leading-relaxed text-cream/75">
              {{ ability.description }}
            </p>
          </div>
        </div>
      </div>

    </div>
    </div>
  </div>
</section>
