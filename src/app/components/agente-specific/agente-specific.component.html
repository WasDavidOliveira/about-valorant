<section class="w-full min-h-screen overflow-hidden" *ngIf="agente && agente.displayName">
  <div class="mt-[112px] mb-16 ml-[300px] md:ml-8 w-[calc(100%-300px)] md:w-[calc(100%-2rem)] flex flex-col gap-6">

    <!-- Title block -->
    <div class="flex flex-col gap-2 px-2 animate-slide-down">
      <span class="text-sm font-display font-bold text-cream/60 uppercase tracking-widest">
        Informações do agente
      </span>
      <h1 class="text-4xl font-display font-black text-cream tracking-tighter uppercase">
        {{ agente.displayName }}
      </h1>
    </div>

    <div class="flex flex-col gap-10">

      <!-- Portrait + Description row -->
      <div class="flex flex-row md:flex-col gap-8 items-start px-2">
        <!-- Portrait -->
        <div
          appScrollReveal
          revealDirection="left"
          [revealDelay]="0"
          class="flex-shrink-0"
        >
          <img
            src="{{ agente.fullPortrait }}"
            alt="{{ agente.displayName }}"
            class="h-[500px] md:h-[300px] object-contain drop-shadow-[0_0_30px_rgba(199,0,57,0.4)]"
          />
        </div>

        <!-- Description + Role -->
        <div class="flex flex-col gap-6 pt-4">
          <p
            appScrollReveal
            [revealDelay]="150"
            class="text-lg font-body text-cream/90 leading-relaxed max-w-[65ch]"
          >
            {{ agente.description }}
          </p>

          <!-- Role block -->
          <div
            *ngIf="agente.role"
            appScrollReveal
            [revealDelay]="250"
            class="flex flex-col gap-3"
          >
            <h2 class="text-lg font-display font-black text-cream uppercase tracking-tight">
              Role
            </h2>
            <div class="bg-crimson rounded-lg p-4 flex flex-col gap-3 cursor-default
                        transition-all duration-300 hover:shadow-[0_4px_20px_-5px_rgba(199,0,57,0.5)]">
              <div class="flex flex-row items-center gap-3">
                <img
                  src="{{ agente.role.displayIcon }}"
                  alt="{{ agente.role.displayName }}"
                  class="w-7 h-7 object-contain"
                />
                <span class="font-display font-bold text-base text-cream uppercase tracking-wide">
                  {{ agente.role.displayName }}
                </span>
              </div>
              <p class="text-sm font-body text-cream/80 leading-relaxed">
                {{ agente.role.description }}
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Abilities -->
      <div
        class="flex flex-col gap-4 px-2"
        appScrollReveal
        [revealDelay]="100"
      >
        <h2 class="text-lg font-display font-black text-cream uppercase tracking-tight">
          Abilities
        </h2>
        <div class="grid grid-cols-4 lg:grid-cols-2 md:grid-cols-1 gap-4">
          <div
            *ngFor="let ability of agente.abilities; let i = index"
            appScrollReveal
            [revealDelay]="100 + i * 80"
            class="group bg-crimson rounded-lg p-4 flex flex-col gap-3 cursor-default
                   border border-crimson-dark/30
                   transition-all duration-300
                   hover:-translate-y-0.5 hover:shadow-[0_8px_30px_-8px_rgba(199,0,57,0.6)]"
          >
            <img
              *ngIf="ability.displayIcon"
              src="{{ ability.displayIcon }}"
              alt="{{ ability.displayName }}"
              class="w-12 h-12 object-contain transition-transform duration-300 group-hover:scale-110"
            />
            <h3 class="font-display font-bold text-sm text-cream uppercase tracking-wide">
              {{ ability.displayName }}
            </h3>
            <p class="text-xs font-body text-cream/75 leading-relaxed">
              {{ ability.description }}
            </p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
