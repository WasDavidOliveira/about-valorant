<section class="w-full min-h-screen overflow-hidden" style="background: #2e000d;">
  <div class="mt-[112px] mb-16 box-border w-full min-w-0 max-w-full pl-4 pr-4 sm:pl-6 sm:pr-6 md:pl-[calc(230px+2rem)] md:pr-10">
    <div class="mx-auto flex w-full min-w-0 max-w-[1400px] flex-col gap-8">

    <header class="px-4">
      <h1 class="m-0 text-2xl font-display font-black uppercase tracking-tighter text-cream animate-slide-down">
        Seasons
      </h1>
    </header>

    <div *ngIf="loading" class="flex flex-col gap-6 px-4">
      <div class="h-5 w-48 rounded-md bg-cream/10 animate-pulse"></div>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <div
          *ngFor="let _ of skeletonSlots"
          class="min-h-[160px] rounded-xl border border-crimson-dark/25 bg-crimson/15 animate-pulse"
        ></div>
      </div>
    </div>

    <div *ngIf="!loading && loadFailed" class="px-4">
      <p class="m-0 rounded-xl border border-white/10 bg-black/20 px-4 py-6 text-sm font-body text-cream/55">
        Could not load seasons. Please refresh the page.
      </p>
    </div>

    <div *ngIf="!loading && !loadFailed && sections.length === 0" class="px-4">
      <p class="m-0 text-sm font-body text-cream/55">No seasons available.</p>
    </div>

    <div *ngIf="!loading && !loadFailed && sections.length > 0" class="flex flex-col gap-14">
      <section
        *ngFor="let sec of sections; let si = index"
        class="flex flex-col gap-5"
        [attr.aria-labelledby]="'temp-sec-' + sec.sectionId"
      >
        <div class="flex items-stretch gap-3 px-4">
          <span class="w-1 shrink-0 rounded-full bg-crimson" aria-hidden="true"></span>
          <h2
            [id]="'temp-sec-' + sec.sectionId"
            class="m-0 min-w-0 text-lg font-display font-black uppercase leading-none tracking-tight text-cream md:text-xl"
          >
            {{ sec.heading }}
          </h2>
        </div>

        <div
          class="grid grid-cols-1 gap-4 px-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"
        >
          <article
            *ngFor="let card of sec.cards; let ci = index"
            appScrollReveal
            [revealDelay]="revealDelay(si, ci)"
            class="group relative flex min-h-[150px] flex-col gap-4 overflow-hidden rounded-xl border border-crimson-dark/40 p-5
                   transition-all duration-400
                   hover:-translate-y-1 hover:border-crimson/50 hover:shadow-[0_20px_50px_-10px_rgba(199,0,57,0.65)]"
            style="background: linear-gradient(160deg, #92002b 0%, #60001c 100%);"
          >
            <div class="pointer-events-none absolute left-0 right-0 top-0 z-[1] h-14 bg-gradient-to-b from-black/40 to-transparent"></div>
            <h3 class="relative z-[2] m-0 text-base font-display font-bold leading-tight tracking-tight text-cream">
              {{ card.title }}
            </h3>
            <div class="relative z-[2] mt-auto flex flex-col gap-2.5 text-sm font-body text-cream/75">
              <span class="flex items-center gap-2">
                <i class="fa-solid fa-calendar-day w-4 shrink-0 text-center text-cream/45" aria-hidden="true"></i>
                <span>Starts <strong class="font-mono font-semibold text-cream">{{ card.startTime | date: 'MMM d, y' }}</strong></span>
              </span>
              <span class="flex items-center gap-2">
                <i class="fa-solid fa-calendar-check w-4 shrink-0 text-center text-cream/45" aria-hidden="true"></i>
                <span>Ends <strong class="font-mono font-semibold text-cream">{{ card.endTime | date: 'MMM d, y' }}</strong></span>
              </span>
            </div>
          </article>
        </div>
      </section>
    </div>

    </div>
  </div>
</section>
